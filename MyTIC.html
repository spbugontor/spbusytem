<body class="h-full bg-gray-100 text-black">
  <div id="app" class="h-full w-full overflow-auto"></div>
  <script>
    // ============ STATE ============
    let allData = [];
    let currentUser = null; // { role: 'management' | 'employee', username, name, emp_id }
    let currentPage = 'login';
    let currentRecordCount = 0;
    let helpOpen = false;
    let selectedLeaderboardMonth = new Date().toISOString().slice(0, 7); // YYYY-MM

    const defaultConfig = {
      system_title: 'MyTIC',
      spbu_name: 'SPBU 54.634.25 GONTOR',
      tagline: "Let's do the best, Allahu Akbar!",
      background_color: '#F15800',
      surface_color: '#E7E7E7',
      text_color: '#000000',
      primary_action_color: '#F15800',
      secondary_action_color: '#7D7D7D',
      contract_alert_days: 30
    };

    // Color palettes
    const colorPalettes = {
      orange: { name: 'Orange', bg: '#F15800', accent: '#FF7A38' },
      blue: { name: 'Blue', bg: '#0066CC', accent: '#3399FF' },
      green: { name: 'Green', bg: '#2D8659', accent: '#4CAF50' },
      purple: { name: 'Purple', bg: '#6B46C1', accent: '#9333EA' },
      red: { name: 'Red', bg: '#D32F2F', accent: '#F44336' },
      teal: { name: 'Teal', bg: '#00897B', accent: '#26A69A' },
      navy: { name: 'Navy', bg: '#1A237E', accent: '#3F51B5' },
      indigo: { name: 'Indigo', bg: '#3F51B5', accent: '#5C6BC0' }
    };

    const MGMT_USER = 'ESDM1926';
    const MGMT_PIN = '901926';

    // ============ HELPERS ============
    function capitalizeWords(input) {
      input.value = input.value.split(/\s+/).map(word => {
        if (word.length === 0) return '';
        return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
      }).join(' ');
    }

    function getEmployees() { return allData.filter(d => d.type === 'employee'); }
    function getTransactions(empId) { return allData.filter(d => d.type === 'transaction' && d.txn_emp_id === empId).sort((a, b) => (b.txn_date || '').localeCompare(a.txn_date || '')); }
    function getLeaves(empId) { return allData.filter(d => d.type === 'leave' && (empId ? d.leave_emp_id === empId : true)).sort((a, b) => (b.leave_date || '').localeCompare(a.leave_date || '')); }
    function getAllLeaves() { return allData.filter(d => d.type === 'leave').sort((a, b) => (b.leave_date || '').localeCompare(a.leave_date || '')); }
    function getLeaveTypes() { return allData.filter(d => d.type === 'leave_type').sort((a, b) => (a.leave_type_name || '').localeCompare(b.leave_type_name || '')); }
    function getRatings(empId) { return allData.filter(d => d.type === 'rating' && (empId ? d.rating_emp_id === empId : true)).sort((a, b) => (b.rating_date || '').localeCompare(a.rating_date || '')); }
    function getCriteria(position) { return allData.filter(d => d.type === 'criteria' && (position ? d.criteria_position === position : true)).sort((a, b) => (a.criteria_name || '').localeCompare(b.criteria_name || '')); }
    function getPinHistory(empId) { return allData.filter(d => d.type === 'pin_history' && (empId ? d.pin_history_emp_id === empId : true)).sort((a, b) => (b.pin_history_date || '').localeCompare(a.pin_history_date || '')); }

    function getExpiringContracts(daysUntilExpiry) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const futureDate = new Date(today);
      futureDate.setDate(futureDate.getDate() + daysUntilExpiry);

      return getEmployees().filter(emp => {
        if (!emp.contract_end) return false;
        const endDate = new Date(emp.contract_end);
        endDate.setHours(0, 0, 0, 0);
        return endDate <= futureDate && endDate >= today;
      }).sort((a, b) => new Date(a.contract_end) - new Date(b.contract_end));
    }

    function genEmpId(position, existingEmps) {
      const prefixes = { 'Manager': 'A', 'Admin': 'B', 'Supervisor': 'C', 'Operator': 'D', 'Cleaning Service': 'E' };
      const prefix = prefixes[position] || 'X';
      const samePos = existingEmps.filter(e => e.position === position);
      let maxNum = 0;
      samePos.forEach(e => {
        const n = parseInt((e.emp_id || '').substring(1)) || 0;
        if (n > maxNum) maxNum = n;
      });
      return prefix + (maxNum + 1);
    }

    function genUsername(name, empId) {
      const first = (name || '').trim().split(/\s+/)[0] || 'USER';
      return (first + '_' + empId).toUpperCase();
    }

    function calcBalance(empId) {
      const txns = getTransactions(empId);
      let balance = 0;
      txns.forEach(t => {
        if (t.txn_type === 'debit') balance += (t.txn_amount || 0);
        else balance -= (t.txn_amount || 0);
      });
      return balance;
    }

    function formatCurrency(n) {
      return 'Rp ' + (n || 0).toLocaleString('id-ID');
    }

    function formatDate(d) {
      if (!d) return '-';
      try { return new Date(d).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }); } catch { return d; }
    }

    function showToast(msg, type = 'success') {
      const existing = document.getElementById('toast-container');
      if (existing) existing.remove();
      const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600' };
      const div = document.createElement('div');
      div.id = 'toast-container';
      div.className = `fixed bottom-24 left-4 right-4 lg:left-auto lg:right-4 z-50 ${colors[type] || colors.info} text-white px-5 py-3 rounded-lg shadow-xl toast-anim text-sm font-medium max-w-xs`;
      div.textContent = msg;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 3000);
    }

    function togglePinVisibility(inputId, iconId) {
      const inp = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (inp.type === 'password') { inp.type = 'text'; icon.setAttribute('data-lucide', 'eye-off'); }
      else { inp.type = 'password'; icon.setAttribute('data-lucide', 'eye'); }
      lucide.createIcons();
    }

    function applyColorPalette(paletteKey) {
      const palette = colorPalettes[paletteKey];
      if (!palette) return;

      const cfg = window.elementSdk?.config || defaultConfig;
      cfg.background_color = palette.bg;
      cfg.primary_action_color = palette.accent;

      if (window.elementSdk) {
        window.elementSdk.setConfig({
          background_color: palette.bg,
          primary_action_color: palette.accent
        });
      }

      toggleColorPalette();
      showToast(`🎨 Palet warna ${palette.name} diterapkan!`);
    }

    // ============ RENDERING ============
    function render() {
      const app = document.getElementById('app');
      const cfg = window.elementSdk?.config || defaultConfig;

      if (currentPage === 'login') {
        renderLogin(app, cfg);
      } else {
        renderDashboard(app, cfg);
      }
      lucide.createIcons();
    }

    // ============ LOGIN ============
    function renderLogin(app, cfg) {
      const employees = getEmployees();
      const empOptions = employees.map(e => `<option value="${e.username}">${e.name} (${e.username})</option>`).join('');
      const bgc = cfg.background_color || '#F15800';
      const ac = cfg.primary_action_color || '#FF7A38';

      app.innerHTML = `
    <div class="h-full w-full flex items-center justify-center p-4" style="background: linear-gradient(135deg, ${bgc} 0%, ${ac} 50%, ${ac}cc 100%);">
      <div class="w-full max-w-md fade-in">
        <div class="text-center mb-6">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-3 bg-white bg-opacity-25">
            <i data-lucide="shield-check" class="w-8 h-8 text-white"></i>
          </div>
          <h1 class="text-3xl font-extrabold text-white tracking-tight">${cfg.system_title || 'MyTIC'}</h1>
          <p class="text-white text-sm mt-1 font-medium opacity-90">${cfg.spbu_name || 'SPBU 54.634.25 GONTOR'}</p>
          <p class="text-white text-xs mt-2 italic font-medium opacity-85">"${cfg.tagline || "Let's do the best, Allahu Akbar!"}"</p>
        </div>

        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
          <!-- Tabs -->
          <div class="flex border-b">
            <button id="tab-mgmt" onclick="switchLoginTab('management')" class="flex-1 py-3 text-sm font-bold text-center transition-all border-b-3">
              <i data-lucide="briefcase" class="w-4 h-4 inline mr-1"></i>Manajemen
            </button>
            <button id="tab-emp" onclick="switchLoginTab('employee')" class="flex-1 py-3 text-sm font-bold text-center transition-all border-b-3">
              <i data-lucide="user" class="w-4 h-4 inline mr-1"></i>Karyawan
            </button>
          </div>

          <!-- Management Login -->
          <div id="login-mgmt" class="p-6">
            <div class="space-y-4">
              <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Username</label>
                <input id="mgmt-user" type="text" inputmode="text" autocapitalize="characters"
                  class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl text-sm font-semibold focus:border-orange-500 focus:ring-0 outline-none transition uppercase"
                  placeholder="Username" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter'){event.preventDefault();doLogin('management')}">
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">PIN (6 digit)</label>
                <div class="relative">
                  <input id="mgmt-pin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl text-sm font-semibold focus:border-orange-500 focus:ring-0 outline-none transition tracking-widest"
                    placeholder="••••••" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,6)" onkeydown="if(event.key==='Enter')doLogin('management')">
                  <button type="button" onclick="togglePinVisibility('mgmt-pin','mgmt-pin-icon')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                    <i id="mgmt-pin-icon" data-lucide="eye" class="w-5 h-5"></i>
                  </button>
                </div>
              </div>
              <div id="mgmt-error" class="text-red-500 text-xs font-medium hidden"></div>
              <button onclick="doLogin('management')" class="w-full py-3 rounded-xl text-white font-bold text-sm transition card-hover" style="background: linear-gradient(135deg, ${bgc} 0%, ${ac === '#FF7A38' ? '#D94500' : ac} 100%)">
                <i data-lucide="log-in" class="w-4 h-4 inline mr-1"></i>Masuk Manajemen
              </button>
            </div>
          </div>

          <!-- Employee Login -->
          <div id="login-emp" class="p-6 hidden">
            <div class="space-y-4">
              <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Pilih Karyawan</label>
                <select id="emp-user" class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl text-sm font-semibold focus:border-orange-500 focus:ring-0 outline-none transition uppercase" onkeydown="if(event.key==='Enter')doLogin('employee')">
                  <option value="">-- Pilih Karyawan --</option>
                  ${empOptions}
                </select>
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">PIN (6 digit)</label>
                <div class="relative">
                  <input id="emp-pin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl text-sm font-semibold focus:border-orange-500 focus:ring-0 outline-none transition tracking-widest"
                    placeholder="••••••" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,6)" onkeydown="if(event.key==='Enter')doLogin('employee')">
                  <button type="button" onclick="togglePinVisibility('emp-pin','emp-pin-icon')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                    <i id="emp-pin-icon" data-lucide="eye" class="w-5 h-5"></i>
                  </button>
                </div>
              </div>
              ${employees.length === 0 ? '<p class="text-xs text-amber-600 bg-amber-50 p-3 rounded-lg"><i data-lucide="alert-triangle" class="w-3 h-3 inline mr-1"></i>Belum ada karyawan. Hubungi manajemen.</p>' : ''}
              <div id="emp-error" class="text-red-500 text-xs font-medium hidden"></div>
              <button onclick="doLogin('employee')" class="w-full py-3 rounded-xl text-white font-bold text-sm transition card-hover" style="background: linear-gradient(135deg, ${bgc} 0%, ${ac === '#FF7A38' ? '#D94500' : ac} 100%)">
                <i data-lucide="log-in" class="w-4 h-4 inline mr-1"></i>Masuk Karyawan
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
      switchLoginTab('management');
    }

    function switchLoginTab(tab) {
      const mgmtTab = document.getElementById('tab-mgmt');
      const empTab = document.getElementById('tab-emp');
      const mgmtForm = document.getElementById('login-mgmt');
      const empForm = document.getElementById('login-emp');
      if (!mgmtTab) return;

      if (tab === 'management') {
        mgmtTab.style.borderBottomColor = '#F15800'; mgmtTab.style.color = '#000000';
        empTab.style.borderBottomColor = 'transparent'; empTab.style.color = '#9ca3af';
        mgmtForm.classList.remove('hidden'); empForm.classList.add('hidden');
      } else {
        empTab.style.borderBottomColor = '#F15800'; empTab.style.color = '#000000';
        mgmtTab.style.borderBottomColor = 'transparent'; mgmtTab.style.color = '#9ca3af';
        empForm.classList.remove('hidden'); mgmtForm.classList.add('hidden');
      }
    }

    function doLogin(role) {
      if (role === 'management') {
        const u = document.getElementById('mgmt-user').value.trim();
        const p = document.getElementById('mgmt-pin').value.trim();
        const err = document.getElementById('mgmt-error');
        if (u !== MGMT_USER || p !== MGMT_PIN) {
          err.textContent = 'Username atau PIN salah!'; err.classList.remove('hidden'); return;
        }
        currentUser = { role: 'management', username: MGMT_USER, name: 'Manajemen' };
        currentPage = 'dashboard'; render();
      } else {
        const u = document.getElementById('emp-user').value;
        const p = document.getElementById('emp-pin').value.trim();
        const err = document.getElementById('emp-error');
        if (!u) { err.textContent = 'Pilih karyawan!'; err.classList.remove('hidden'); return; }
        const emp = getEmployees().find(e => e.username === u);
        if (!emp || emp.pin !== p) {
          err.textContent = 'PIN salah!'; err.classList.remove('hidden'); return;
        }
        currentUser = { role: 'employee', username: emp.username, name: emp.name, emp_id: emp.emp_id };
        currentPage = 'emp-dashboard'; render();
      }
    }

    // ============ DASHBOARD SHELL ============
    function renderDashboard(app, cfg) {
      const isManagement = currentUser.role === 'management';
      const bgc = cfg.background_color || '#0f4c3a';

      let menuItems = [];
      if (isManagement) {
        menuItems = [
          { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' },
          { id: 'employees', icon: 'users', label: 'Karyawan' },
          { id: 'debits', icon: 'wallet', label: 'Tunggakan' },
          { id: 'leaves', icon: 'calendar-days', label: 'Izin/Cuti' },
          { id: 'leave-types', icon: 'calendar-check', label: 'Jenis Cuti' },
          { id: 'violations', icon: 'alert-circle', label: 'Kartu Pelanggaran' },
          { id: 'savings', icon: 'coins', label: 'Tabungan' },
          { id: 'ratings', icon: 'star', label: 'Penilaian' },
          { id: 'criteria', icon: 'settings', label: 'Kriteria' },
          { id: 'leaderboard', icon: 'trophy', label: 'Papan Peringkat' },
        ];
      } else {
        menuItems = [
          { id: 'emp-dashboard', icon: 'layout-dashboard', label: 'Dashboard' },
          { id: 'emp-debits', icon: 'wallet', label: 'Tunggakan Saya' },
          { id: 'emp-leaves', icon: 'calendar-days', label: 'Izin/Cuti' },
          { id: 'emp-violations', icon: 'alert-circle', label: 'Pelanggaran Saya' },
          { id: 'emp-savings', icon: 'coins', label: 'Tabungan' },
          { id: 'emp-ratings', icon: 'star', label: 'Penilaian Saya' },
          { id: 'emp-leaderboard', icon: 'trophy', label: 'Papan Peringkat' },
          { id: 'emp-profile', icon: 'user', label: 'Profil Saya' },
          { id: 'emp-change-pin', icon: 'key', label: 'Ubah PIN' },
          { id: 'emp-edit-profile', icon: 'pencil', label: 'Edit Profil' },
        ];
      }

      const sidebarLinks = menuItems.map(m => `
    <button onclick="navigateTo('${m.id}')" class="sidebar-link w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-white/90 ${currentPage === m.id ? 'active bg-white/15' : ''}">
      <i data-lucide="${m.icon}" class="w-4 h-4"></i>${m.label}
    </button>
  `).join('');

      const bottomLinks = menuItems.map(m => `
    <button onclick="navigateTo('${m.id}')" class="flex flex-col items-center gap-0.5 text-xs ${currentPage === m.id ? 'font-bold' : 'opacity-60'}" style="color:${currentPage === m.id ? bgc : '#6b7280'}">
      <i data-lucide="${m.icon}" class="w-5 h-5"></i>
      <span class="truncate" style="max-width:60px">${m.label}</span>
    </button>
  `).join('');

      app.innerHTML = `
    <div class="h-full w-full flex flex-col lg:flex-row">
      <!-- Sidebar (desktop) -->
      <aside class="hidden lg:flex flex-col w-60 shrink-0 p-4 text-white" style="background:${bgc}">
        <div class="mb-6">
          <h1 class="text-lg font-extrabold tracking-tight">${cfg.system_title || 'MyTIC'}</h1>
          <p class="text-xs text-green-200 mt-0.5">${cfg.spbu_name || 'SPBU 54.634.25 GONTOR'}</p>
        </div>
        <div class="flex items-center gap-3 mb-6 p-3 bg-white/10 rounded-xl">
          <div class="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center">
            <i data-lucide="${isManagement ? 'briefcase' : 'user'}" class="w-4 h-4"></i>
          </div>
          <div class="min-w-0">
            <p class="text-sm font-bold truncate">${currentUser.name}</p>
            <p class="text-xs text-green-200">${isManagement ? 'Manajemen' : currentUser.emp_id}</p>
          </div>
        </div>
        <nav class="space-y-1 flex-1">${sidebarLinks}</nav>
        <button onclick="doLogout()" class="sidebar-link w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-red-300 hover:bg-red-500/20 mt-2">
          <i data-lucide="log-out" class="w-4 h-4"></i>Keluar
        </button>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 flex flex-col min-w-0 overflow-hidden lg:pb-0 pb-24">
        <!-- Mobile Header -->
        <header class="lg:hidden flex items-center justify-between px-4 py-3 text-white shrink-0 z-40" style="background:${bgc}">
          <div>
            <h1 class="text-sm font-extrabold">${cfg.system_title || 'MyTIC'}</h1>
            <p class="text-xs text-green-200">${currentUser.name}</p>
          </div>
          <div class="flex items-center gap-2">

    function updateContractEnd() {
      const typeEl = document.getElementById('ef-contract-type');
      const startEl = document.getElementById('ef-contract-start');
      const endEl = document.getElementById('ef-contract-end');

      if (!typeEl || !startEl || !endEl) return;

      const type = typeEl.value;
      const startDate = startEl.value;

      if (!startDate) {
        endEl.value = '';
        return;
      }

      const start = new Date(startDate);
      const end = new Date(start);

      // Training = 3 months, Tetap = 1 year
      if (type === 'Training') {
        end.setMonth(end.getMonth() + 3);
      } else if (type === 'Tetap') {
        end.setFullYear(end.getFullYear() + 1);
      }

      // Format as YYYY-MM-DD for input[type="date"]
      endEl.value = end.toISOString().split('T')[0];
    }

    async function saveEmployee() {
      const name = document.getElementById('ef-name').value.trim();
      const gender = document.getElementById('ef-gender').value;
      const position = document.getElementById('ef-position').value;
      const pin = document.getElementById('ef-pin').value.trim();
      const contractType = document.getElementById('ef-contract-type').value;
      const contractStart = document.getElementById('ef-contract-start').value;
      const contractEnd = document.getElementById('ef-contract-end').value;
      const phone = document.getElementById('ef-phone').value.trim();
      const email = document.getElementById('ef-email').value.trim();
      const dob = document.getElementById('ef-dob').value;
      const address = document.getElementById('ef-address').value.trim();
      const err = document.getElementById('ef-error');
      const btn = document.getElementById('ef-save-btn');

      if (!name || !pin || pin.length !== 6 || !contractStart || !contractEnd) {
        err.textContent = 'Nama, PIN 6 digit, jenis kontrak, dan tanggal kontrak wajib diisi!'; err.classList.remove('hidden'); return;
      }

      btn.disabled = true; btn.textContent = 'Menyimpan...';

      const otherEmps = getEmployees().filter(e => !editingEmpId || e.__backendId !== editingEmpId);
      const emp_id = genEmpId(position, otherEmps);
      const username = genUsername(name, emp_id);

      if (editingEmpId) {
        const existing = allData.find(d => d.__backendId === editingEmpId);
        const result = await window.dataSdk.update({ ...existing, name, gender, position, emp_id, username, pin, contract_type: contractType, contract_start: contractStart, contract_end: contractEnd, phone, email, date_of_birth: dob, address });
        if (result.isOk) showToast('Karyawan diperbarui!');
        else { err.textContent = 'Gagal menyimpan!'; err.classList.remove('hidden'); }
      } else {
        if (currentRecordCount >= 999) { showToast('Batas data tercapai (999)!', 'error'); btn.disabled = false; btn.textContent = 'Simpan'; return; }
        const result = await window.dataSdk.create({ type: 'employee', name, gender, position, emp_id, username, pin, contract_type: contractType, contract_start: contractStart, contract_end: contractEnd, phone, email, date_of_birth: dob, address });
        if (result.isOk) showToast('Karyawan ditambahkan!');
        else { err.textContent = 'Gagal menyimpan!'; err.classList.remove('hidden'); }
      }
      btn.disabled = false; btn.textContent = 'Simpan';
      editingEmpId = null;
    }

    async function deleteEmp(backendId) {
      const rec = allData.find(d => d.__backendId === backendId);
      if (!rec) return;

      // Delete employee and all related data (transactions, leaves, ratings)
      const result = await window.dataSdk.delete(rec);
      if (result.isOk) {
        // Delete all related records
        const relatedRecords = allData.filter(d =>
          (d.type === 'transaction' && d.txn_emp_id === rec.emp_id) ||
          (d.type === 'leave' && d.leave_emp_id === rec.emp_id) ||
          (d.type === 'rating' && d.rating_emp_id === rec.emp_id)
        );

        for (const related of relatedRecords) {
          await window.dataSdk.delete(related);
        }

        // Renumber remaining employees with same position
        const remaining = getEmployees().filter(e => e.position === rec.position && e.__backendId !== backendId);
        const prefixes = { 'Manager': 'A', 'Admin': 'B', 'Supervisor': 'C', 'Operator': 'D', 'Cleaning Service': 'E' };

        remaining.forEach((emp, idx) => {
          const newId = prefixes[emp.position] + (idx + 1);
          if (newId !== emp.emp_id) {
            const newUsername = genUsername(emp.name, newId);
            window.dataSdk.update({ ...emp, emp_id: newId, username: newUsername });
          }
        });

        showToast('Karyawan dan riwayat terkait dihapus!');
      } else {
        showToast('Gagal menghapus!', 'error');
      }
    }

    async function saveTxn(empId, txnType) {
      const amt = parseFloat(document.getElementById('txn-amt-' + empId).value) || 0;
      const date = document.getElementById('txn-date-' + empId).value;
      const note = document.getElementById('txn-note-' + empId).value.trim();
      const btn = document.getElementById('txn-save-' + empId);
      if (amt <= 0) { showToast('Jumlah harus > 0!', 'error'); return; }
      if (!date) { showToast('Tanggal harus dipilih!', 'error'); return; }

      // Validate payment cannot exceed debt
      if (txnType === 'credit') {
        const currentBalance = calcBalance(empId);
        if (amt > currentBalance) {
          showToast(`Pembayaran tidak boleh melebihi hutang (Rp ${currentBalance.toLocaleString('id-ID')})!`, 'error');
          return;
        }
      }

      if (currentRecordCount >= 999) { showToast('Batas data tercapai!', 'error'); return; }
      btn.disabled = true; btn.textContent = 'Menyimpan...';
      const result = await window.dataSdk.create({
        type: 'transaction', txn_emp_id: empId, txn_type: txnType, txn_amount: amt, txn_note: note, txn_date: date
      });
      if (result.isOk) showToast('Transaksi disimpan!');
      else showToast('Gagal!', 'error');
      btn.disabled = false; btn.textContent = 'Simpan';
    }

    async function saveViolation(empId) {
      const type = document.getElementById('vio-type-' + empId).value.trim();

      btn.disabled = true; btn.textContent = 'Menyimpan...';

    function updateBulkSavingPreview() {
      const amt = parseFloat(document.getElementById('bulk-saving-amt')?.value) || 0;
      const month = document.getElementById('bulk-saving-month')?.value.trim() || '';
      const date = document.getElementById('bulk-saving-date')?.value || '';
      const selectedEmps = Array.from(document.querySelectorAll('.bulk-saving-checkbox:checked')).length;
      const preview = document.getElementById('bulk-saving-preview');
      const previewText = document.getElementById('bulk-saving-preview-text');

      if (amt > 0 && month && date && selectedEmps > 0) {
        preview?.classList.remove('hidden');
        if (previewText) {
          previewText.innerHTML = `
        <strong>${selectedEmps}</strong> karyawan akan menerima tabungan <strong>${formatCurrency(amt)}</strong> 
        untuk bulan <strong>${month}</strong> tanggal <strong>${new Date(date).toLocaleDateString('id-ID')}</strong>
      `;
        }
      } else {
        preview?.classList.add('hidden');
      }
    }

    async function saveBulkSaving() {
      const amt = parseFloat(document.getElementById('bulk-saving-amt')?.value) || 0;
      const month = document.getElementById('bulk-saving-month')?.value.trim() || '';
      const date = document.getElementById('bulk-saving-date')?.value || '';
      const errDiv = document.getElementById('bulk-saving-error');
      const errText = document.getElementById('bulk-saving-error-text');
      const btn = document.getElementById('bulk-saving-btn');
      const preview = document.getElementById('bulk-saving-preview');
      const modalDiv = btn.closest('.fixed');

      const selectedEmps = Array.from(document.querySelectorAll('.bulk-saving-checkbox:checked')).map(c => c.value);

      // Validasi
      const errors = [];
      if (selectedEmps.length === 0) errors.push('Pilih minimal 1 karyawan');
      if (amt <= 0) errors.push('Jumlah tabungan harus lebih dari Rp 0');
      if (!month) errors.push('Bulan harus diisi');
      if (!date) errors.push('Tanggal harus dipilih');

      if (currentRecordCount + selectedEmps.length > 999) {
        errors.push(`Hanya bisa tambah ${999 - currentRecordCount} tabungan lagi`);
      }

      if (errors.length > 0) {
        if (errDiv && errText) {
          errDiv.classList.remove('hidden');
          errText.innerHTML = errors.map(e => `• ${e}`).join('<br>');
        }
        return;
      }

      // Hide error dan mulai proses
      errDiv?.classList.add('hidden');
      preview?.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 inline animate-spin mr-2"></i>Memproses (0/${selectedEmps.length})`;
      lucide.createIcons();

      let successCount = 0;
      let failedEmps = [];

      // Process dengan batch kecil untuk feedback lebih cepat
      for (let i = 0; i < selectedEmps.length; i++) {
        const empId = selectedEmps[i];
        const result = await window.dataSdk.create({
          type: 'saving',
          saving_emp_id: empId,
          saving_amount: amt,
          saving_month: month,
          saving_date: date
        });

        if (result.isOk) {
          successCount++;
        } else {
          const emp = getEmployees().find(e => e.emp_id === empId);
          failedEmps.push(emp ? emp.name : empId);
        }

        // Update progress button setiap item
        btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 inline animate-spin mr-2"></i>Memproses (${successCount + failedEmps.length}/${selectedEmps.length})`;
      }

      const failCount = failedEmps.length;

      // Handle hasil
      if (successCount > 0 && failCount === 0) {
        // ✅ Semua berhasil
        btn.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4 inline mr-2"></i>✅ ${successCount} Berhasil!`;
        showToast(`✅ Tabungan ${successCount} karyawan berhasil disimpan!`);
        setTimeout(() => {
          modalDiv?.remove();
        }, 800);
      } else if (successCount > 0 && failCount > 0) {
        // ⚠️ Sebagian berhasil
        btn.innerHTML = `<i data-lucide="alert-circle" class="w-4 h-4 inline mr-2"></i>${successCount} Berhasil, ${failCount} Gagal`;
        showToast(`✅ ${successCount} berhasil, ${failCount} gagal!`, 'error');
        if (errDiv && errText) {
          errDiv.classList.remove('hidden');
          errText.innerHTML = `<strong>✅ ${successCount} berhasil diproses</strong><br>❌ Gagal: ${failedEmps.join(', ')}`;
        }
        btn.disabled = false;
      } else {
        // ❌ Semua gagal
        btn.innerHTML = `<i data-lucide="x-circle" class="w-4 h-4 inline mr-2"></i>Semua Gagal`;
        showToast('❌ Gagal memproses semua karyawan!', 'error');
        if (errDiv && errText) {
          errDiv.classList.remove('hidden');
          errText.innerHTML = `<strong>❌ Gagal memproses:</strong><br>${failedEmps.join(', ')}`;
        }
        btn.disabled = false;
      }

      if (successCount > 0 && failCount === 0) {
        // Jangan update button jika sukses semua (karena akan dihapus)
      } else {
        lucide.createIcons();
      }
    }

    function updateWithdrawInfo(empId) {
      const amt = parseFloat(document.getElementById('withdraw-amt-' + empId).value) || 0;
      const savings = getSavings(empId);
      const totalSaved = savings.reduce((sum, s) => sum + (s.saving_amount || 0), 0);
      const remaining = totalSaved - amt;
      const info = document.getElementById('withdraw-info-' + empId);

      if (info) {
        if (amt > 0) {
          info.innerHTML = `Sisa setelah penarikan: <strong>${formatCurrency(remaining)}</strong>`;
          if (amt > totalSaved) {
            info.innerHTML += '<br><span class="text-red-600 font-bold">⚠️ Jumlah melebihi saldo!</span>';
          }
        }
      }
    }

    async function saveWithdraw(empId) {
      const amt = parseFloat(document.getElementById('withdraw-amt-' + empId).value) || 0;
      const date = document.getElementById('withdraw-date-' + empId).value;
      const note = document.getElementById('withdraw-note-' + empId).value.trim();
      const btn = document.getElementById('withdraw-save-' + empId);
      const savings = getSavings(empId);
      const totalSaved = savings.reduce((sum, s) => sum + (s.saving_amount || 0), 0);

      if (amt <= 0) { showToast('Jumlah harus > 0!', 'error'); return; }
      if (!date) { showToast('Tanggal harus dipilih!', 'error'); return; }
      if (amt > totalSaved) { showToast(`Jumlah melebihi saldo (${formatCurrency(totalSaved)})!`, 'error'); return; }

      btn.disabled = true; btn.textContent = 'Memproses...';

      if (currentRecordCount >= 999) { showToast('Batas data tercapai!', 'error'); btn.disabled = false; btn.textContent = 'Proses Penarikan'; return; }

      const result = await window.dataSdk.create({
        type: 'saving',
        saving_emp_id: empId,
        saving_amount: -amt,
        saving_month: 'Penarikan - ' + new Date(date).toLocaleString('id-ID', { month: 'long', year: 'numeric' }),
        saving_date: date,
        saving_note: note
      });

      if (result.isOk) {
        showToast('Penarikan berhasil dicatat!');
        document.getElementById('withdraw-form-' + empId).innerHTML = '';
      } else {
        showToast('Gagal memproses!', 'error');
      }

      btn.disabled = false; btn.textContent = 'Proses Penarikan';
    }

    }

    async function saveCriteria() {
      const name = document.getElementById('cf-name').value.trim();
      const position = document.getElementById('cf-position').value;
      const err = document.getElementById('cf-error');
      const btn = document.getElementById('cf-save-btn');

      if (!name) {
        err.textContent = 'Nama kriteria wajib diisi!'; err.classList.remove('hidden'); return;
      }

      btn.disabled = true; btn.textContent = 'Menyimpan...';

      if (editingCriteriaId) {
        const existing = allData.find(d => d.__backendId === editingCriteriaId);
        const result = await window.dataSdk.update({
          ...existing,
          criteria_name: name,
          criteria_position: position
        });
        if (result.isOk) showToast('Kriteria diperbarui!');
        else { err.textContent = 'Gagal menyimpan!'; err.classList.remove('hidden'); }
      } else {
        if (currentRecordCount >= 999) { showToast('Batas data tercapai!', 'error'); btn.disabled = false; btn.textContent = 'Simpan'; return; }
        const result = await window.dataSdk.create({
          type: 'criteria',
          criteria_name: name,
          criteria_position: position,
          criteria_type: 'Penilaian'
        });
        if (result.isOk) showToast('Kriteria ditambahkan!');
        else { err.textContent = 'Gagal menyimpan!'; err.classList.remove('hidden'); }
      }
      btn.disabled = false; btn.textContent = 'Simpan';
      editingCriteriaId = null;
    }

    function confirmDeleteCriteria(backendId) {
      const el = document.getElementById('del-crit-confirm-' + backendId);
      if (el) el.classList.remove('hidden');
    }

    async function deleteCriteria(backendId) {

      const result = await window.dataSdk.delete(rec);
      if (result.isOk) showToast('Kriteria dihapus!');
      else showToast('Gagal!', 'error');
    }

    function calculateAverageRating() {
      const ratings = getRatings();
      if (ratings.length === 0) return 0;

      let total = 0;
      let count = 0;

      ratings.forEach(r => {
        try {
          const scoreData = typeof r.rating_scores === 'string' ? JSON.parse(r.rating_scores) : (r.rating_scores || {});
          const scores = typeof scoreData === 'object' ? scoreData : {};
          const values = Object.values(scores).filter(v => typeof v === 'number');
          if (values.length > 0) {
            const avg = values.reduce((a, b) => a + b, 0) / values.length;
            total += avg;
            count += 1;
          }
        } catch (e) { }
      });

      return count > 0 ? total / count : 0;
    }

    async function saveRating() {
      const empId = document.getElementById('rf-emp').value;
      const date = document.getElementById('rf-date').value;
      const notes = document.getElementById('rf-notes').value.trim();
      const err = document.getElementById('rf-error');
      const btn = document.getElementById('rf-save-btn');

      const selectedEmp = getEmployees().find(e => e.emp_id === empId);
      const selectedPosition = selectedEmp?.position || '';
      const allCriteria = getCriteria();
      const criteria = allCriteria.filter(c => !c.criteria_position || c.criteria_position === selectedPosition);

      if (!empId || !date) {
        err.textContent = 'Karyawan dan tanggal wajib dipilih!'; err.classList.remove('hidden'); return;
      }

      const scores = {};
      let allFilled = true;
      criteria.forEach(c => {
        const scoreEl = document.getElementById('rf-score-' + c.__backendId);
        if (scoreEl) {
          const score = parseInt(scoreEl.value);
          if (score) scores[c.criteria_name] = score;
          else allFilled = false;
        }
      });

      if (!allFilled || Object.keys(scores).length === 0) {
        err.textContent = 'Semua kriteria harus diberi nilai!'; err.classList.remove('hidden'); return;
      }

      // Check if employee already rated this month
      if (!editingRatingId) {
        const ratingDate = new Date(date);
        const ratingMonth = ratingDate.getFullYear() + '-' + String(ratingDate.getMonth() + 1).padStart(2, '0');

        const existingRating = getRatings(empId).find(r => {
          const rDate = new Date(r.rating_date);
          const rMonth = rDate.getFullYear() + '-' + String(rDate.getMonth() + 1).padStart(2, '0');
          return rMonth === ratingMonth;
        });

        if (existingRating) {
          err.textContent = `Karyawan ini sudah dinilai pada bulan ${new Intl.DateTimeFormat('id-ID', { month: 'long', year: 'numeric' }).format(ratingDate)}. Penilaian hanya boleh 1x per bulan!`;
          err.classList.remove('hidden');
          return;
        }
      }

      btn.disabled = true; btn.textContent = 'Menyimpan...';

      if (editingRatingId) {
        const existing = allData.find(d => d.__backendId === editingRatingId);
        const result = await window.dataSdk.update({
          ...existing,
          rating_emp_id: empId,
          rating_date: date,
          rating_scores: JSON.stringify(scores),
          rating_notes: notes
        });
        if (result.isOk) {
          showToast('Penilaian diperbarui!');
          document.getElementById('rating-form-container').innerHTML = '';
          editingRatingId = null;
        } else { err.textContent = 'Gagal!'; err.classList.remove('hidden'); }
      } else {
        if (currentRecordCount >= 999) { showToast('Batas data tercapai!', 'error'); btn.disabled = false; btn.textContent = 'Simpan'; return; }
        const result = await window.dataSdk.create({
          type: 'rating',
          rating_emp_id: empId,
          rating_date: date,
          rating_scores: JSON.stringify(scores),
          rating_notes: notes
        });
        if (result.isOk) {
          showToast('Penilaian disimpan!');
          document.getElementById('rating-form-container').innerHTML = '';
          editingRatingId = null;
        } else { err.textContent = 'Gagal!'; err.classList.remove('hidden'); }
      }
      btn.disabled = false; btn.textContent = 'Simpan';
    }

    function filterAndRenderRatings() {
      const searchInput = document.getElementById('rating-search')?.value?.toLowerCase() || '';
      const monthFilter = document.getElementById('rating-month-filter')?.value || '';
      const scoreFilter = parseFloat(document.getElementById('rating-score-filter')?.value || 0) || 0;

      const ratings = getRatings();
      const emps = getEmployees();
      const bgc = defaultConfig.background_color || '#0f4c3a';
      const ac = defaultConfig.primary_action_color || '#e8a838';

      let filtered = ratings.filter(r => {
        const emp = emps.find(e => e.emp_id === r.rating_emp_id);
        const empName = (emp ? emp.name : r.rating_emp_id).toLowerCase();

        // Search by name
        if (searchInput && !empName.includes(searchInput)) return false;

        // Filter by month
        if (monthFilter) {
          const ratingMonth = r.rating_date.substring(0, 7);
          if (ratingMonth !== monthFilter) return false;
        }

        // Filter by score
        if (scoreFilter > 0) {
          try {
            const scoreData = typeof r.rating_scores === 'string' ? JSON.parse(r.rating_scores) : (r.rating_scores || {});
            const scores = typeof scoreData === 'object' ? scoreData : {};
            const values = Object.values(scores).filter(v => typeof v === 'number');
            const avg = values.length > 0 ? (values.reduce((a, b) => a + b, 0) / values.length) : 0;
            if (avg < scoreFilter) return false;
          } catch (e) {
            return false;
          }
        }

        return true;
      });

      // Update info text
      const infoEl = document.getElementById('rating-filter-info');
      if (infoEl) {
        const total = ratings.length;
        if (searchInput || monthFilter || scoreFilter > 0) {
          infoEl.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4 mr-2"></i><span>Menampilkan <strong>${filtered.length}</strong> dari <strong>${total}</strong> penilaian</span>`;
        } else {
          infoEl.innerHTML = `<i data-lucide="list" class="w-4 h-4 mr-2"></i><span>Total <strong>${total}</strong> penilaian</span>`;
        }
        lucide.createIcons();

        container.innerHTML = `

          <i data-lucide="refresh-cw" class="w-3 h-3"></i>Bersihkan Filter
        </button>
      </div>
    `;
        lucide.createIcons();
        return;
      }

      container.innerHTML = filtered.map(r => {
        const emp = emps.find(e => e.emp_id === r.rating_emp_id);
        try {
          const scoreData = typeof r.rating_scores === 'string' ? JSON.parse(r.rating_scores) : (r.rating_scores || {});
          const scores = typeof scoreData === 'object' ? scoreData : {};
          const values = Object.values(scores).filter(v => typeof v === 'number');
          const avg = values.length > 0 ? (values.reduce((a, b) => a + b, 0) / values.length).toFixed(1) : 0;

          // Determine color based on score

          let scoreEmoji = '';
          let scoreBg = '';

          else if (avg >= 3.5) { scoreColor = 'text-blue-600'; scoreEmoji = '🔵'; scoreBg = 'bg-blue-100 border-blue-300'; }
          else if (avg >= 2.5) { scoreColor = 'text-yellow-600'; scoreEmoji = '🟡'; scoreBg = 'bg-yellow-100 border-yellow-300'; }
          else { scoreColor = 'text-red-600'; scoreEmoji = '🔴'; scoreBg = 'bg-red-100 border-red-300'; }

            </button>

    function showEmpLeaveQuotaInfo() {
      const cat = document.getElementById('elef-category').value;
      const typeEl = document.getElementById('elef-type');
      const quotaInfo = document.getElementById('elef-quota-info');
      const quotaDetails = document.getElementById('elef-quota-details');

      if (cat !== 'Cuti' || !typeEl.value) {
        quotaInfo.classList.add('hidden');
        return;
      }

      const emp = getEmployees().find(e => e.username === currentUser.username);

      if (!leaveType) {
        quotaInfo.classList.add('hidden');
        return;
      }

      // Hitung cuti yang sudah disetujui
      const approvedLeaves = getLeaves(emp.emp_id).filter(l =>
        l.leave_status === 'Disetujui' &&
        l.leave_type === leaveType.leave_type_name
      );

      let usedQuota = 0;
      approvedLeaves.forEach(l => {
        const s = new Date(l.leave_start);
        const e = new Date(l.leave_end);
        const d = Math.ceil((e - s) / (1000 * 60 * 60 * 24)) + 1;
        usedQuota += d;
      });

      quotaDetails.innerHTML = `

    </div>

      <div class="bg-green-500 h-2 rounded-full" style="width: ${Math.min(100, 100 - usedPercent)}%"></div>
    </div>
  `;
      quotaInfo.classList.remove('hidden');

    async function saveEmpLeave() {
      const emp = getEmployees().find(e => e.username === currentUser.username);
      if (!emp) return;

      const category = document.getElementById('elef-category').value;
      const type = category === 'Izin' ? 'Izin Pribadi' : document.getElementById('elef-type').value;
      const start = document.getElementById('elef-start').value;
      const end = document.getElementById('elef-end').value;
      const reason = document.getElementById('elef-reason').value.trim();
      const err = document.getElementById('elef-error');
      const btn = document.getElementById('elef-save-btn');

      if (!type || !start || !end) {
        err.textContent = 'Semua field wajib diisi!'; err.classList.remove('hidden'); return;
      }

      if (new Date(end) < new Date(start)) {
        err.textContent = 'Tanggal selesai harus setelah tanggal mulai!'; err.classList.remove('hidden'); return;
      }

      // Calculate duration
      const startDate = new Date(start);
      const endDate = new Date(end);
      const duration = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;

      // Validasi jatah cuti jika kategori Cuti
      if (category === 'Cuti') {
        const leaveType = getLeaveTypes().find(lt => lt.leave_type_name === type);
        if (leaveType) {
          const quota = leaveType.leave_type_quota;

          // Hitung cuti yang sudah disetujui
          const approvedLeaves = getLeaves(emp.emp_id).filter(l =>
            l.leave_status === 'Disetujui' &&
            l.leave_type === type
          );

          let usedQuota = 0;
          approvedLeaves.forEach(l => {
            const s = new Date(l.leave_start);
            const e = new Date(l.leave_end);
            const d = Math.ceil((e - s) / (1000 * 60 * 60 * 24)) + 1;
            usedQuota += d;
          });

          const remaining = quota - usedQuota;

          if (duration > remaining) {
            err.textContent = `Jatah cuti tidak cukup! Tersisa ${remaining} hari dari ${quota} hari. Anda meminta ${duration} hari.`;
            err.classList.remove('hidden');
            return;
          }
        }
      }

    async function changePin() {
      const emp = getEmployees().find(e => e.username === currentUser.username);
      if (!emp) return;

      const oldPin = document.getElementById('old-pin').value;
      const newPin = document.getElementById('new-pin').value;
      const confirmPin = document.getElementById('confirm-pin').value;
      const err = document.getElementById('cpin-error');
      const btn = document.getElementById('cpin-btn');

      if (oldPin !== emp.pin) {
        err.textContent = 'PIN lama salah!'; err.classList.remove('hidden'); return;
      }
      if (newPin.length !== 6 || confirmPin.length !== 6) {
        err.textContent = 'PIN baru harus 6 digit!'; err.classList.remove('hidden'); return;
      }
      if (newPin !== confirmPin) {
        err.textContent = 'PIN baru tidak cocok!'; err.classList.remove('hidden'); return;
      }

      btn.disabled = true; btn.textContent = 'Mengubah...';

      // Update employee PIN
      const result1 = await window.dataSdk.update({ ...emp, pin: newPin });

      if (result1.isOk) {
        // Record PIN history
        if (currentRecordCount < 999) {
          await window.dataSdk.create({
            type: 'pin_history',
            pin_history_emp_id: emp.emp_id,
            pin_history_old: oldPin,
            pin_history_new: newPin,
            pin_history_date: new Date().toISOString().split('T')[0]
          });
        }
        showToast('PIN berhasil diubah!');
        document.getElementById('old-pin').value = '';
        document.getElementById('new-pin').value = '';
        document.getElementById('confirm-pin').value = '';
        err.classList.add('hidden');
      } else {
        err.textContent = 'Gagal mengubah PIN!'; err.classList.remove('hidden');
      }

      btn.disabled = false; btn.textContent = 'Ubah PIN';
    }

    // ============ LEADERBOARD ============
    function getLeaderboardData(month) {
      const ratings = getRatings().filter(r => {
        const rDate = new Date(r.rating_date);
        const rMonth = rDate.getFullYear() + '-' + String(rDate.getMonth() + 1).padStart(2, '0');
        return rMonth === month;
      });

      const empScores = {};
      ratings.forEach(r => {
        if (!empScores[r.rating_emp_id]) {
          empScores[r.rating_emp_id] = { scores: [], rating_count: 0 };
        }
        try {
          const scoreData = typeof r.rating_scores === 'string' ? JSON.parse(r.rating_scores) : (r.rating_scores || {});
          const scores = typeof scoreData === 'object' ? scoreData : {};
          const values = Object.values(scores).filter(v => typeof v === 'number');
          if (values.length > 0) {
            const avg = values.reduce((a, b) => a + b, 0) / values.length;
            empScores[r.rating_emp_id].scores.push(avg);
            empScores[r.rating_emp_id].rating_count += 1;
          }
        } catch (e) { }
      });

      const leaderboard = Object.entries(empScores).map(([empId, data]) => {
        const emp = getEmployees().find(e => e.emp_id === empId);
        const avgScore = data.scores.length > 0 ? (data.scores.reduce((a, b) => a + b, 0) / data.scores.length).toFixed(2) : 0;
        return {
          emp_id: empId,
          emp_name: emp ? emp.name : empId,
          emp_position: emp ? emp.position : '',
          avg_score: parseFloat(avgScore),
          rating_count: data.rating_count
        };
      }).sort((a, b) => b.avg_score - a.avg_score);

      return leaderboard;
    }

      <div class="bg-blue-50 rounded-xl p-4 border border-blue-200 mb-6">

      ${myData ? `
        <div class="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-xl p-6 shadow-sm border border-blue-200 mb-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs text-gray-600 mb-2">Posisi Anda Saat Ini</p>
              <div class="flex items-center gap-3">
                <p class="text-5xl font-extrabold text-blue-600">#${myRank}</p>
                <div>
                  <p class="text-2xl font-extrabold text-blue-600">${myData.avg_score}/5</p>
