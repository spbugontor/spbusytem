<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Migrasi Data Absensi</title>
  <style>
    body { font-family: sans-serif; background: #0F172A; color: #F8FAFC; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #1E293B; padding: 2rem; border-radius: 1rem; max-width: 500px; width: 90%; text-align: center; }
    h2 { margin-bottom: 1rem; }
    #status { margin-top: 1rem; padding: 1rem; background: #334155; border-radius: 0.5rem; font-size: 0.9rem; white-space: pre-wrap; text-align: left; }
    .success { color: #4ADE80; }
    .error { color: #F87171; }
    .info { color: #60A5FA; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🔄 Migrasi Data Absensi</h2>
    <p>Menghapus semua data karyawan bernama <strong>"Ajel"</strong> (termasuk riwayat absensi) dari Firebase.</p>
    <div id="status" class="info">Memulai proses...</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

    const statusEl = document.getElementById('status');
    function log(msg, cls) {
      statusEl.innerHTML += `<span class="${cls || ''}">${msg}</span>\n`;
    }

    try {
      const app = initializeApp({
        apiKey: "AIzaSyBBcb3lbQJQ30BZZoBV4j5l1mTwPfsVh2o",
        authDomain: "spbu-system.firebaseapp.com",
        databaseURL: "https://spbu-system-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "spbu-system",
        storageBucket: "spbu-system.firebasestorage.app",
        messagingSenderId: "397973887906",
        appId: "1:397973887906:web:7e7a2f502db9efa3df70fb"
      });

      const db = getDatabase(app);
      statusEl.innerHTML = '';
      log('Terhubung ke Firebase...', 'info');

      const snap = await get(ref(db, 'absensi/records'));
      const records = snap.val();
      
      const empSnap = await get(ref(db, 'absensi/employees'));
      const emps = empSnap.val();

      const TARGET_NAME = "Ajel";
      const updates = {};
      let countRec = 0;
      let countEmp = 0;

      if (records) {
        for (const [key, rec] of Object.entries(records)) {
          if (rec.emp_name === TARGET_NAME) {
            updates[`absensi/records/${key}`] = null; // delete
            countRec++;
          }
        }
      }
      
      if (emps) {
        for (const [key, emp] of Object.entries(emps)) {
          if (emp.name === TARGET_NAME) {
            updates[`absensi/employees/${key}`] = null; // delete
            countEmp++;
          }
        }
      }

      if (countRec === 0 && countEmp === 0) {
        log(`Tidak ada data dengan nama "${TARGET_NAME}".`, 'info');
      } else {
        log(`Ditemukan ${countEmp} data profil dan ${countRec} riwayat absensi bernama "${TARGET_NAME}".`, 'info');
        log(`Menghapus data...`, 'info');

        await update(ref(db), updates);
        log(`\n✅ Berhasil menghapus semua data ${TARGET_NAME}!`, 'success');
        log('\nSilakan tutup halaman ini dan refresh halaman absensi utama.', 'success');
      }
    } catch (err) {
      log('Error: ' + err.message, 'error');
    }
  </script>
</body>
</html>
